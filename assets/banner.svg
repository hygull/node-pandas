<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">node-pandas — Pandas for Node.js</title>
  <desc id="desc">Pandas-style DataFrame and Series for Node.js with zero runtime dependencies.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1a2238"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
  </g>

  <!-- left mark: stylized DataFrame "table" cells -->
  <g transform="translate(120, 130)">
    <!-- 3x3 cell grid suggesting a DataFrame -->
    <g fill="none" stroke="url(#accent)" stroke-width="3">
      <rect x="0" y="0" width="40" height="40" rx="4"/>
      <rect x="48" y="0" width="40" height="40" rx="4"/>
      <rect x="96" y="0" width="40" height="40" rx="4"/>
      <rect x="0" y="48" width="40" height="40" rx="4"/>
      <rect x="48" y="48" width="40" height="40" rx="4"/>
      <rect x="96" y="48" width="40" height="40" rx="4"/>
      <rect x="0" y="96" width="40" height="40" rx="4"/>
      <rect x="48" y="96" width="40" height="40" rx="4"/>
      <rect x="96" y="96" width="40" height="40" rx="4"/>
    </g>
    <!-- highlighted "header" row -->
    <g fill="url(#accent)" opacity="0.85">
      <rect x="0" y="0" width="40" height="40" rx="4"/>
      <rect x="48" y="0" width="40" height="40" rx="4"/>
      <rect x="96" y="0" width="40" height="40" rx="4"/>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <g transform="translate(340, 0)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" fill="#f8fafc">
    <text x="0" y="200" font-size="92" font-weight="700" letter-spacing="-2">
      node<tspan fill="url(#accent)">-</tspan>pandas
    </text>
    <text x="0" y="248" font-size="28" fill="#cbd5e1" letter-spacing="0.5">
      Pandas for Node.js. Series &amp; DataFrame for JavaScript.
    </text>
    <text x="0" y="286" font-size="20" fill="#94a3b8" letter-spacing="0.3">
      groupBy · merge · loc · iloc · at · iat · setIndex · apply · rolling windows · CSV
    </text>
    <!-- footer line -->
    <g transform="translate(0, 320)" font-size="18" fill="#64748b">
      <text x="0" y="0">npm install node-pandas</text>
      <text x="280" y="0" fill="#475569">·</text>
      <text x="300" y="0">zero dependencies</text>
      <text x="500" y="0" fill="#475569">·</text>
      <text x="520" y="0">MIT</text>
    </g>
  </g>

  <!-- thin accent bar bottom -->
  <rect x="0" y="396" width="1280" height="4" fill="url(#accent)"/>
</svg>
