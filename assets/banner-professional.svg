<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">node-pandas — Pandas for Node.js (professional theme)</title>
  <desc id="desc">A pandas-style data manipulation library for Node.js, with a clean corporate color palette.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- subtle vertical accent -->
  <rect x="0" y="0" width="8" height="400" fill="url(#brand)"/>

  <!-- subtle dot grid -->
  <g fill="#cbd5e1" opacity="0.6">
    <circle cx="40" cy="40" r="1.5"/>
    <circle cx="80" cy="40" r="1.5"/>
    <circle cx="40" cy="80" r="1.5"/>
    <circle cx="1240" cy="360" r="1.5"/>
    <circle cx="1200" cy="360" r="1.5"/>
    <circle cx="1240" cy="320" r="1.5"/>
  </g>

  <!-- left mark: clean DataFrame icon -->
  <g transform="translate(120, 130)">
    <!-- table outline -->
    <rect x="0" y="0" width="160" height="140" rx="6" fill="#ffffff" stroke="#1e40af" stroke-width="3"/>
    <!-- header row -->
    <rect x="0" y="0" width="160" height="36" rx="6" fill="url(#brand)"/>
    <rect x="0" y="30" width="160" height="6" fill="url(#brand)"/>
    <!-- column dividers -->
    <line x1="55" y1="0" x2="55" y2="140" stroke="#1e40af" stroke-width="2"/>
    <line x1="105" y1="0" x2="105" y2="140" stroke="#1e40af" stroke-width="2"/>
    <!-- row dividers -->
    <line x1="0" y1="72" x2="160" y2="72" stroke="#cbd5e1" stroke-width="1.5"/>
    <line x1="0" y1="106" x2="160" y2="106" stroke="#cbd5e1" stroke-width="1.5"/>
    <!-- cell content hints -->
    <g fill="#94a3b8">
      <rect x="10" y="50" width="35" height="6" rx="2"/>
      <rect x="65" y="50" width="30" height="6" rx="2"/>
      <rect x="115" y="50" width="35" height="6" rx="2"/>
      <rect x="10" y="85" width="35" height="6" rx="2"/>
      <rect x="65" y="85" width="30" height="6" rx="2"/>
      <rect x="115" y="85" width="35" height="6" rx="2"/>
      <rect x="10" y="120" width="35" height="6" rx="2"/>
      <rect x="65" y="120" width="30" height="6" rx="2"/>
      <rect x="115" y="120" width="35" height="6" rx="2"/>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <g transform="translate(340, 0)" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" fill="#0f172a">
    <text x="0" y="195" font-size="92" font-weight="800" letter-spacing="-3">
      node<tspan fill="#1e40af">-</tspan>pandas
    </text>
    <text x="0" y="245" font-size="28" font-weight="500" fill="#334155" letter-spacing="0.3">
      Pandas for Node.js. Series &amp; DataFrame for JavaScript.
    </text>
    <text x="0" y="283" font-size="17" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" fill="#475569" letter-spacing="0.3">groupBy · merge · loc · iloc · at · iat</text>
    <text x="0" y="312" font-size="17" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" fill="#475569" letter-spacing="0.3">setIndex · apply · rolling · expanding · readCsv · toCsv</text>
    <g transform="translate(0, 345)" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" fill="#64748b">
      <text x="0" y="0" font-weight="700" fill="#1e40af">$ npm install node-pandas</text>
      <text x="300" y="0" fill="#cbd5e1">·</text>
      <text x="320" y="0">zero dependencies</text>
      <text x="520" y="0" fill="#cbd5e1">·</text>
      <text x="540" y="0">MIT</text>
    </g>
  </g>

  <!-- bottom accent bar -->
  <rect x="0" y="396" width="1280" height="4" fill="url(#brand)"/>
</svg>
