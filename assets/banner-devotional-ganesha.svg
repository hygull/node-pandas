<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">node-pandas — Pandas for Node.js (Ganesha-inspired theme)</title>
  <desc id="desc">A pandas-style data manipulation library for Node.js, with a Lord Ganesha inspired theme of modak red and lotus pink, featuring lotus, modak, and ankush motifs.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="60%" stop-color="#fbcfe8"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <linearGradient id="kumkum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="lotusPetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbcfe8"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#f5cb47"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- subtle floral dots -->
  <g fill="#dc2626" opacity="0.15">
    <circle cx="40" cy="40" r="4"/>
    <circle cx="100" cy="60" r="3"/>
    <circle cx="60" cy="100" r="3"/>
    <circle cx="1240" cy="360" r="4"/>
    <circle cx="1180" cy="340" r="3"/>
    <circle cx="1220" cy="300" r="3"/>
  </g>

  <!-- left mark: stylized lotus + modak + DataFrame grid -->
  <g transform="translate(140, 90)">
    <!-- lotus petals (8 petals around center) -->
    <g fill="url(#lotusPetal)" stroke="#9d174d" stroke-width="1.5">
      <!-- top -->
      <ellipse cx="80" cy="50" rx="14" ry="36" transform="rotate(0 80 80)"/>
      <ellipse cx="80" cy="50" rx="14" ry="36" transform="rotate(45 80 80)"/>
      <ellipse cx="80" cy="50" rx="14" ry="36" transform="rotate(90 80 80)"/>
      <ellipse cx="80" cy="50" rx="14" ry="36" transform="rotate(135 80 80)"/>
      <ellipse cx="80" cy="50" rx="14" ry="36" transform="rotate(180 80 80)"/>
      <ellipse cx="80" cy="50" rx="14" ry="36" transform="rotate(225 80 80)"/>
      <ellipse cx="80" cy="50" rx="14" ry="36" transform="rotate(270 80 80)"/>
      <ellipse cx="80" cy="50" rx="14" ry="36" transform="rotate(315 80 80)"/>
    </g>
    <!-- lotus center (modak — sweet offering) -->
    <circle cx="80" cy="80" r="22" fill="url(#kumkum)" stroke="url(#gold)" stroke-width="3"/>
    <!-- modak peak (cone on top of the center) -->
    <path d="M 70 65 L 90 65 L 80 50 Z" fill="url(#kumkum)" stroke="url(#gold)" stroke-width="2"/>
    <!-- om-like syllable mark (simple bindi) -->
    <circle cx="80" cy="82" r="5" fill="url(#gold)"/>

    <!-- 2x2 DataFrame grid below the lotus -->
    <g transform="translate(60, 170)" stroke="url(#kumkum)" stroke-width="2.5" fill="none" opacity="0.95">
      <rect x="0" y="0" width="18" height="18" rx="2"/>
      <rect x="22" y="0" width="18" height="18" rx="2"/>
      <rect x="0" y="22" width="18" height="18" rx="2"/>
      <rect x="22" y="22" width="18" height="18" rx="2"/>
    </g>
  </g>

  <!-- wordmark + tagline + Sanskrit invocation -->
  <g transform="translate(340, 0)" fill="#831843">
    <!-- Sanskrit invocation: ॐ श्री गणेशाय नमः — "Salutations to Sri Ganesha" -->
    <text x="0" y="80" font-family="'Noto Serif Devanagari', 'Tiro Devanagari Sanskrit', 'Mangal', serif" font-size="28" fill="url(#kumkum)" letter-spacing="2">ॐ श्री गणेशाय नमः</text>

    <text x="0" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace" font-size="92" font-weight="700" letter-spacing="-2" fill="#831843">
      node<tspan fill="url(#kumkum)">-</tspan>pandas
    </text>
    <text x="0" y="248" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="28" fill="#9d174d" letter-spacing="0.5">
      Pandas for Node.js. Series &amp; DataFrame for JavaScript.
    </text>
    <text x="0" y="283" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="17" fill="#be185d" letter-spacing="0.3">groupBy · merge · loc · iloc · at · iat</text>
    <text x="0" y="312" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="17" fill="#be185d" letter-spacing="0.3">setIndex · apply · rolling · expanding · readCsv · toCsv</text>
    <g transform="translate(0, 345)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="18" fill="#a21caf">
      <text x="0" y="0" font-weight="700" fill="url(#kumkum)">npm install node-pandas</text>
      <text x="280" y="0" fill="url(#kumkum)">·</text>
      <text x="300" y="0">zero dependencies</text>
      <text x="500" y="0" fill="url(#kumkum)">·</text>
      <text x="520" y="0">MIT</text>
    </g>
  </g>

  <!-- bottom accent bar -->
  <rect x="0" y="396" width="1280" height="4" fill="url(#kumkum)"/>
</svg>
